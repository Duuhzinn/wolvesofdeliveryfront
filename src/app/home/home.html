<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>MOTORISTAS</h2>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>NOME</th>
          <th>TELEFONE</th>
          <th>TIPO USUÁRIO</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let usuario of usuarios">
          <td>{{ usuario.id }}</td>
          <td>{{ usuario.nome }}</td>
          <td>{{ usuario.telefone }}</td>
          <td>{{ usuario.tipoUser }}</td>
          <td [ngClass]="usuario.status === 1 ? 'online' : usuario.status === 2 ? 'ocupado' : 'offline'">
            {{ usuario.status === 1 ? 'ON-LINE' : usuario.status === 2 ? 'OCUPADO' : 'OFF-LINE' }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
