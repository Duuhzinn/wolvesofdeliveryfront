<div class="container">
  <div class="cards-container">

    <div class="motorista-card header-card">
      <h2>MOTORISTAS</h2>
    </div>

    <div class="motorista-card" *ngFor="let usuario of usuarios">
      <div class="card-top">
        <span class="card-id">#{{ usuario.id }}</span>
        <span [ngClass]="{
          'badge-online': usuario.status === 1,
          'badge-ocupado': usuario.status === 2,
          'badge-offline': usuario.status !== 1 && usuario.status !== 2
        }">
        {{ usuario.status === 1 ? 'ON-LINE' : usuario.status === 2 ? 'OCUPADO' : 'OFF-LINE' }}</span>
      </div>
      <div class="card-body">
        <p><i class="ti ti-user"></i> <span>{{ usuario.nome }}</span></p>
        <p><i class="ti ti-phone"></i> {{ usuario.telefone }}</p>
        <p><i class="ti ti-id-badge"></i> {{ usuario.tipoUser }}</p>
      </div>
    </div>

  </div>
</div>
