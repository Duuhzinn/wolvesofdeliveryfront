<div class="login-fundo">
  <form class="login-card" (ngSubmit)="login()">

    <div class="login-logo">
      <img src="/logoWolves.png" alt="Logo Wolves">
    </div>

    <div class="login-field">
      <label for="login">LOGIN</label>
      <input type="text" [(ngModel)]="usuario.login" id="login" name="login" placeholder="CPF ou CNPJ" required>
    </div>

    <div class="login-field">
      <label for="senha">SENHA</label>
      <input type="password" [(ngModel)]="usuario.senha" id="senha" name="senha" placeholder="Digite sua senha" required>
    </div>

    <button type="submit">Acessar</button>

  </form>
</div>
