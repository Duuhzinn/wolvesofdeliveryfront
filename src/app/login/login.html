<div class="fundo-tela d-flex align-items-center justify-content-center">
  <form class="p-4 shadow" (ngSubmit)="login()">
    
    <!-- Imagem Centralizada no topo do Card -->
    <div class="text-center mb-3">
      <img src="/logoWolves.png" alt="Logo Wolves" class="logo-card">
    </div>

    <h2 class="text-center mb-4">Login</h2>

    <div class="form-group">
      <label for="login">LOGIN</label>
      <input type="text" class="form-control" [(ngModel)]="usuario.login" id="login" name="login" placeholder="Digite seu CPF ou CNPJ" required>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" class="form-control" [(ngModel)]="usuario.senha" id="senha" name="senha" placeholder="Digite sua senha" required>
    </div>

    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary btn-block" >Acessar</button>
    </div>
  </form>
</div>
