<!-- Mostra a navbar no topo -->
<app-navbar *ngIf="mostrarNavbar()"></app-navbar>

<!-- Conteúdo das páginas aparece aqui -->
<main>
  <router-outlet></router-outlet>
</main>

<!-- MODAL GLOBAL DE CORRIDA -->
<div class="modal-overlay" *ngIf="corrida$ | async">
  <div class="modal-corrida">
    <h1>🏍️ NOVA CORRIDA</h1>
    <p>Você recebeu uma nova corrida!</p>
    <div class="botoes">
      <button class="btn-aceitar"
              (click)="aceitarCorrida()">
        ACEITAR
      </button>
      <button class="btn-recusar"
              (click)="recusarCorrida()">
        RECUSAR
      </button>
    </div>
  </div>
</div>
