<div class="container">
  <div class="cards-container">

    <div class="corrida-card header-card">
      <h2>ORDEM DA FILA DOS MOTORISTAS</h2>
    </div>

    <div class="corrida-card" *ngFor="let usuario of usuarios; let i = index">
      <div class="card-top">
        <span class="card-id">{{ i + 1 }}º da fila</span>
        <span [ngClass]="{
          'status-online': usuario.status === 1,
          'status-offline': usuario.status !== 1
        }">
          {{ usuario.status === 1 ? 'ON-LINE' : 'OFF-LINE' }}
        </span>
      </div>
      <div class="card-body">
        <p class="card-label">MOTORISTA</p>
        <p><i class="ti ti-user" aria-hidden="true"></i> <span>{{ usuario.nome }}</span></p>
        <p class="card-label">CONTATO</p>
        <p><i class="ti ti-phone" aria-hidden="true"></i> <span>{{ usuario.telefone }}</span></p>
      </div>
    </div>

  </div>
</div>
