<div class="container">
  <div class="cards-container">

    <div class="motorista-card">
      <h2>🛰️ RASTREAR MOTORISTAS</h2>
    </div>

    @if (corridasAtivas.length === 0) {
      <p class="sem-corridas">Nenhuma corrida em andamento no momento.</p>
    } @else {
      <div class="select-wrapper">
        <select class="motorista-select" (change)="selecionarCorrida($event)">
          <option value="">Selecione um motorista...</option>
          @for (corrida of corridasAtivas; track corrida.id) {
            <option [value]="corrida.id">
              🏁 Corrida #{{ corrida.id }} — 🏍️ {{ corrida.motorista?.nome }}
            </option>
          }
        </select>
      </div>
    }

    @if (corridaSelecionada && sinalPerdido) {
      <div class="sinal-perdido">
        ⚠️ Sinal perdido — última posição conhecida
      </div>
    }

    <div class="mapa-wrapper">
      @if (!corridaSelecionada) {
        <div class="mapa-placeholder">
          <span>Selecione um motorista para ver no mapa</span>
        </div>
      }
      <div id="mapa" [class.visivel]="corridaSelecionada"></div>
    </div>

  </div>
</div>
